services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/prisma    # SQLite DB persistent
      - ./uploads:/app/uploads  # uploaded files persistent
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
